stages:
  - test
  - build
  - docker

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

test:
  stage: test
  image: maven:3.9-amazoncorretto-17
  script:
    - mvn test
  cache:
    key: "$CI_PROJECT_PATH"
    paths:
      - .m2/repository
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

build:
  stage: build
  image: maven:3.9-amazoncorretto-17
  script:
    - mvn clean package -DskipTests
  cache:
    key: "$CI_PROJECT_PATH"
    paths:
      - .m2/repository
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"