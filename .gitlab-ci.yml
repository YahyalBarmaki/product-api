stages:
  - test
  - build
  - docker

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

.maven_template: &maven_config
  image: maven:3.9-amazoncorretto-17
  cache:
    key: "$CI_PROJECT_PATH"
    paths:
      - .m2/repository
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  before_script:
    - |
      cat > /root/.m2/settings.xml <<EOF
      <settings>
        <servers>
          <server>
            <id>gitlab</id>
            <configuration>
              <httpHeaders>
                <property>
                  <name>Job-Token</name>
                  <value>\${CI_JOB_TOKEN}</value>
                </property>
              </httpHeaders>
            </configuration>
          </server>
        </servers>
      </settings>
      EOF

test:
  stage: test
  <<: *maven_config
  services:
    - name: mysql:8
      alias: mysql
  variables:
    MYSQL_DATABASE: productdb
    MYSQL_ROOT_PASSWORD: secret
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/productdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: secret
  script:
    - mvn test

build:
  stage: build
  <<: *maven_config
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  dependencies:
    - build
  script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"